version: '3.8'
services:
  wallet-api:
    build: .
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://wallet:wallet@postgres:5433/wallet
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - wallet-network
    command: sh -c "npx prisma migrate deploy && npm start"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - wallet-network

volumes:
  postgres_data:

networks:
  wallet-network:
    driver: bridge